services:
  portal:
    build: .
    restart: unless-stopped

    # No ports: mapping — Traefik on Server A proxies to this container
    # via the private network between servers. Port 3000 is never
    # bound to the host or exposed to the internet.
    expose:
      - "3000"

    environment:
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB:   ${POSTGRES_DB:-market_portal}
      POSTGRES_USER: ${POSTGRES_USER:-portal_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      N8N_WEBHOOK_URL: ${N8N_WEBHOOK_URL}
      SESSION_SECRET: ${SESSION_SECRET}
      NODE_ENV: production
      PORT: 3000
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}

    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.market-portal.rule=Host(`${PORTAL_DOMAIN}`)"
      - "traefik.http.routers.market-portal.entrypoints=http"
      - "traefik.http.services.market-portal.loadbalancer.server.port=3000"

    networks:
      - coolify             # Required for Traefik routing
      - coolify-shared    # Replace with your exact Postgres network name

# ── IMPORTANT ────────────────────────────────────────────────────────────────
# Before pushing to GitHub, replace the two placeholder network names below
# with the exact names from: docker network ls  (run on Server B)
# ─────────────────────────────────────────────────────────────────────────────
networks:
  coolify:
    external: true
  coolify-shared:         # ← replace with exact name from Server B
    external: true
